name: wheels

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'
      branches:
        description: 'branches tested'
        required: false
        default: 'main'
      publish_to_pypi:
        description: 'publish built artifacts to PyPI'
        required: false
        default: 'false'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux x86
          - name: linux-x86_64
            runs-on: ubuntu-24.04
            cibw_archs_linux: x86_64

          # linux aarch64
          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            cibw_archs_linux: aarch64

          # arm64 mac
          - name: macos-arm64
            runs-on: macos-15
            cibw_archs_macos: arm64

          # x86_64 mac
          - name: macos-x86_64
            runs-on: macos-15-intel
            cibw_archs_macos: x86_64


    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v3.2.1
        with:
          output-dir: dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}

      - if: matrix.name == 'linux-x86_64'
        name: Build source distribution
        run: |
          python -m pip install --upgrade "pip>=25.1"
          python -m pip install --group release
          mkdir -p dist-sdist
          python -m build --sdist -o dist-sdist
          mv dist-sdist/*.tar.gz dist/

      - name: Upload wheels & sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: dist/*

  runtime-lower-bounds:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-linux-x86_64
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Test wheel runtime floors
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --only-binary=:all: \
            "numpy==2.1.*" \
            "scipy==1.15.*" \
            "pandas==2.3.*" \
            "PyYAML==6.0.2" \
            "PyWavelets==1.9.*" \
            "structlog==25.5.*" \
            "itrigamma==0.2.0a1"
          python -m pip install --no-index --find-links dist consenrich
          python -c "import consenrich, consenrich.ccounts, consenrich.cconsenrich, consenrich.cuncertainty, consenrich.shrinkState"

  publish:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true'
    needs:
      - build
      - runtime-lower-bounds
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
