name: Tests

on:
  push:
    branches:
      - main
      - lean
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'
      branches:
        description: 'branches tested'
        required: false
        default: 'lean'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Get samtools, bedtools, buildtools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            samtools bedtools \
            build-essential \
            gcc g++

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=25.1"
          python -m pip install --group test -e .

      - name: Run tests
        env:
          PYTHONWARNINGS: error::DeprecationWarning,error::PendingDeprecationWarning
        run: |
          python -m pytest -q tests
